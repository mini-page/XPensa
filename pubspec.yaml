name: xpensa
description: Expense tracking app

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  uuid: ^4.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.66.0
  intl: ^0.18.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0A6BE8"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"

flutter_native_splash:
  color: "#0A6BE8"
  image: assets/icon/splash_mark.png
  android: true
  ios: true
  web: false
  fullscreen: true
  android_12:
    color: "#0A6BE8"
    image: assets/icon/splash_mark.png
