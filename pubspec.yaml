name: xpens
description: Expense tracking app
version: 2.1.0+21

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^1.2.0
  intl: ^0.20.2
  uuid: ^4.5.3
  mobile_scanner: ^7.2.0
  path_provider: ^2.1.5
  archive: ^3.6.1
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  home_widget: ^0.9.1
  workmanager: ^0.9.0
  share_plus: ^10.1.4
  http: ^1.2.2
  url_launcher: ^6.3.1
  path: ^1.9.1
  crypto: ^3.0.6
  local_auth: ^2.3.0
  characters: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0A6BE8"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"

flutter_native_splash:
  color: "#0A6BE8"
  image: assets/icon/splash_mark.png
  android: true
  ios: true
  web: false
  fullscreen: true
  android_12:
    color: "#0A6BE8"
    image: assets/icon/splash_mark.png
